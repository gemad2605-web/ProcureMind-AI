# .github/workflows/test.yml
# 🧪 اختبار تلقائي عند كل Pull Request

name: Run Tests

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. إعداد Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      # 3. تثبيت التبعيات
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      # 4. التحقق من جودة الكود (Linting)
      - name: Lint with flake8
        run: |
          cd backend
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      # 5. التحقق من التنسيق (Formatting)
      - name: Check formatting with black
        run: |
          cd backend
          black --check app/ tests/
      
      # 6. تشغيل الاختبارات مع تغطية الكود
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
      
      # 7. رفع تقرير التغطية إلى Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
      
      # 8. حفظ تقرير الاختبارات
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/htmlcov/
            backend/coverage.xml
          retention-days: 7

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      # 3. تثبيت التبعيات
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      # 4. التحقق من الجودة (Linting)
      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint  # إذا كان موجوداً
        continue-on-error: true
      
      # 5. بناء المشروع
      - name: Build project
        run: |
          cd frontend
          npm run build
      
      # 6. تشغيل الاختبارات (إذا وجدت)
      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false
        continue-on-error: true
      
      # 7. حفظ نتائج البناء
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. إعداد البيئة
      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y docker docker-compose
      
      # 3. تشغيل الخدمات
      - name: Start services
        run: |
          docker-compose -f docker/docker-compose.yml up -d
          sleep 10
      
      # 4. اختبار الاتصال
      - name: Test API health
        run: |
          curl -f http://localhost:8000/api/health || exit 1
      
      # 5. اختبار الشات
      - name: Test chat endpoint
        run: |
          curl -X POST http://localhost:8000/api/chat \
            -H "Content-Type: application/json" \
            -d '{"question":"ما هي سياسة المشتريات؟"}' \
            -f || exit 1
      
      # 6. إيقاف الخدمات
      - name: Stop services
        if: always()
        run: |
          docker-compose -f docker/docker-compose.yml down

  test-security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. فحص التبعيات
      - name: Check Python dependencies
        uses: pyupio/safety@v2
        with:
          file: backend/requirements.txt
      
      # 3. فحص Node.js dependencies
      - name: Check Node dependencies
        run: |
          cd frontend
          npm audit --audit-level=moderate
      
      # 4. فحص الملفات الحساسة
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 5. فحص Dockerfile
      - name: Check Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: backend/Dockerfile

  test-performance:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. تشغيل الخادم
      - name: Start backend
        run: |
          cd backend
          pip install -r requirements.txt
          uvicorn app.main:app --port 8000 &
          sleep 5
      
      # 3. اختبار الأداء
      - name: Run performance tests
        run: |
          pip install locust
          cd backend
          locust -f tests/performance.py --headless -u 10 -r 2 --host http://localhost:8000 --run-time 30s
        continue-on-error: true
      
      # 4. حفظ النتائج
      - name: Save performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-results
          path: |
            backend/locust_stats.csv
            backend/locust_failures.csv
          retention-days: 7

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-integration, test-security]
    if: always()
    
    steps:
      # إشعار على Slack (اختياري)
      - name: Send Slack notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: ${{ job.status == 'success' && '✅ Tests Passed' || '❌ Tests Failed' }}
          SLACK_MESSAGE: |
            ProcureMind-AI Tests
            Backend: ${{ needs.test-backend.result }}
            Frontend: ${{ needs.test-frontend.result }}
            Integration: ${{ needs.test-integration.result }}
            Security: ${{ needs.test-security.result }}
            PR: ${{ github.event.pull_request.html_url || 'Push to ' }}${{ github.ref }}
      
      # إشعار على GitHub
      - name: Add PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const result = {
              backend: '${{ needs.test-backend.result }}',
              frontend: '${{ needs.test-frontend.result }}',
              integration: '${{ needs.test-integration.result }}',
              security: '${{ needs.test-security.result }}'
            };
            
            const status = Object.values(result).every(r => r === 'success') ? '✅' : '❌';
            const message = `
            ## 🧪 Test Results ${status}
            
            | Component | Status |
            |-----------|--------|
            | Backend   | ${result.backend === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Frontend  | ${result.frontend === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Integration | ${result.integration === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Security  | ${result.security === 'success' ? '✅ Passed' : '❌ Failed'} |
            
            ${status === '✅' ? '🎉 All tests passed!' : '⚠️ Some tests failed. Please check the logs.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
