# .github/workflows/deploy.yml
# 🚀 نشر تلقائي عند الرفع على main branch

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. إعداد Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      # 3. إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      # 4. تثبيت تبعيات Backend
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      # 5. تثبيت تبعيات Frontend
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
      
      # 6. بناء Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
      
      # 7. تشغيل الاختبارات
      - name: Run Tests
        run: |
          cd backend
          pytest tests/ -v
      
      # 8. بناء صورة Docker
      - name: Build Docker Images
        run: |
          docker-compose -f docker/docker-compose.yml build
      
      # 9. تسجيل الدخول إلى Docker Hub (اختياري)
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      # 10. دفع الصور إلى Docker Hub (اختياري)
      - name: Push Docker Images
        if: success()
        run: |
          docker-compose -f docker/docker-compose.yml push
      
      # 11. نشر على الخادم (اختياري)
      - name: Deploy to Server
        if: success()
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/procuremind
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f
      
      # 12. إشعار بالنجاح
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📍 Frontend: https://your-domain.com"
          echo "📍 Backend API: https://api.your-domain.com"
      
      # 13. إشعار بالفشل
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed! Please check the logs."
          exit 1
